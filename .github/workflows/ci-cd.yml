name: Mirror Me Ecosystem CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ==========================================
  # FRONTEND NEXT.JS PIPELINE
  # ==========================================
  frontend-ci:
    name: Frontend CI (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint --if-present

      - name: Run Frontend Tests
        run: npm test --if-present

      - name: Build Next.js Application
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.mirror-me.example.com

  # ==========================================
  # BACKEND NODE.JS PIPELINE
  # ==========================================
  backend-node-ci:
    name: Backend Node CI (Express/TS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend-node
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: backend-node/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run TypeScript Compilation Check
        run: npm run build --if-present

      - name: Run Node Backend Tests
        run: npm test --if-present

  # ==========================================
  # BACKEND PYTHON AI PIPELINE
  # ==========================================
  backend-python-ci:
    name: Backend Python CI (AI Pipeline)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend-python
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Linting / Flake8
        run: |
          pip install flake8
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: true

      - name: Run Python Tests
        run: |
          pip install pytest
          pytest --if-present

  # ==========================================
  # DOCKER BUILD VERIFICATION (INTEGRATION)
  # ==========================================
  docker-build-verify:
    name: Docker Compose Integration Check
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-node-ci, backend-python-ci]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Docker Compose Files Configuration
        run: docker compose config
