name: Deploy Next.js site to Pages
on:
  push:
    branches: ["main"] # Ensure this matches your default branch name

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          # Change this path to point to your root-level lockfile
          cache-dependency-path: 'package-lock.json'
      - run: npm install
      - run: npm run build # This creates the 'out' folder
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend/out' # Adjust if your 'out' folder is elsewhere

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/deploy-pages@v4
